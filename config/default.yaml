# White Whale default configuration.
# Override locally by creating config/local.yaml (gitignored) and pointing
# the CLI at it with --config config/local.yaml.

db:
  path: ./whitewhale.db

ingest:
  rtds_url: wss://ws-live-data.polymarket.com
  reconnect_max_backoff_seconds: 60
  log_unknown_message_types: true
  gamma:
    base_url: https://gamma-api.polymarket.com
    request_timeout_seconds: 10
    # Honor Gamma's ~300 req / 10 s on /markets. 0.05s pace = 200 req/10s.
    # Token-bucket upgrade deferred to Phase 6.
    min_request_interval_seconds: 0.05
    refresh_max_age_seconds: 3600
    refresh_batch_limit: 100
  subgraph:
    # Polymarket's public Goldsky orderbook-subgraph. No API key.
    url: https://api.goldsky.com/api/public/project_cl6mb8i9h0003e201j6li0diw/subgraphs/orderbook-subgraph/0.0.1/gn
    request_timeout_seconds: 30
    min_request_interval_seconds: 0.1

whale_filter:
  # Phase 1 records every trade; Phase 2 selects whale events from them.
  min_size_usdc: 5000
  min_market_liquidity_usdc: 50000
  # Same wallet + market inside this window collapses to one event, so a
  # whale churning a position doesn't produce a burst of alerts.
  dedupe_window_seconds: 90
  # A trade whose market hasn't been enriched yet has unknown liquidity and
  # can't clear the liquidity floor. Keep false so we don't alert blind.
  allow_unknown_liquidity: false

alerts:
  # Only emit when the copy score clears this bar.
  min_score: 60
  # At most one alert per market in this window (measured on trade time), so a
  # market many whales pile into doesn't spam the bot.
  market_cooldown_seconds: 300
  # File-drop sink: one JSON file per alert lands here for the existing bot.
  drop_dir: ./alerts
  schema_version: "1.0"

stats:
  # Cold-path wallet_stats refresh (Phase 6). The daily systemd timer runs the
  # one-shot job; this interval is only used by `refresh-stats --loop`.
  refresh_interval_seconds: 86400

health:
  # `whitewhale health --serve` binds here. 127.0.0.1 by default; set 0.0.0.0 to
  # expose the heartbeat to another host on the LAN.
  host: 127.0.0.1
  port: 8787
  # A component's heartbeat older than this marks the system unhealthy (HTTP 503).
  stale_after_seconds: 900

scoring:
  # Default weights from docs/research-notes.md §5.
  # Sum must equal 1.0. Hot-reloadable in Phase 6.
  weights:
    wallet_pnl_score:          0.20
    wallet_winrate_score:      0.15
    history_depth_score:       0.05
    conviction_size_score:     0.15
    time_to_resolution_score:  0.10
    price_impact_score:        0.05
    non_arb_score:             0.10
    non_mm_score:              0.10
    organic_price_score:       0.10
  thresholds:
    round_trip_window_seconds: 60
    mid_price_band_bps:        30
    mm_turnover_lookback:      50
  # Sub-score mapping knobs. Sketches from research-notes §5; [CALIBRATE] in
  # Phase 5. All scores are 0-100, higher = more copyable.
  params:
    min_resolved_bets:           5     # wallets below this aren't PnL-rankable
    history_depth_saturation:    100   # trade_count at which history_depth hits 100
    time_to_resolution_hours:    168   # taper window (1 week); floor beyond it
    time_to_resolution_floor:    20
    price_impact_saturation_bps: 200   # |price-mid| bps that maxes price_impact
    round_trip_saturation:       20    # round_trip_count_30d that drives non_arb to 0
    neutral_score:               50    # used when an input is missing
  # Confidence labels, independent of total (research-notes §6).
  confidence:
    high_depth:   70
    high_total:   60
    medium_depth: 40
